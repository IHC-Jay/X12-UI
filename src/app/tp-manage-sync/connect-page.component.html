<main class="page">
  <section class="card" aria-labelledby="connect-title">
    <h1 id="connect-title">TP Manage Sync</h1>
    <p class="subtitle">Enter your credentials, source, and destination endpoints.</p>

    <form (ngSubmit)="connect()" class="connect-form">
      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        [(ngModel)]="username"
        required
      />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        required
      />

      <label for="sourceServerPort">Source Server:Port</label>
      <input
        id="sourceServerPort"
        name="sourceServerPort"
        type="text"
        placeholder="localhost:8080"
        [(ngModel)]="sourceServerPort"
        required
      />

      <label for="destinationServerPort">Destination Server:Port</label>
      <input
        id="destinationServerPort"
        name="destinationServerPort"
        type="text"
        placeholder="localhost:8081"
        [(ngModel)]="destinationServerPort"
        required
      />

      <label for="destinationNamespace">Destination Namespace</label>
      <input
        id="destinationNamespace"
        name="destinationNamespace"
        type="text"
        placeholder="MISC"
        [(ngModel)]="destinationNamespace"
        required
      />

      <button type="submit" [disabled]="isConnecting">
        {{ isConnecting ? 'Connecting...' : 'Connect' }}
      </button>

      @if (statusMessage) {
        <p class="status" [class.success]="statusType === 'success'" [class.error]="statusType === 'error'">
          {{ statusMessage }}
        </p>
      }
    </form>
  </section>
</main>
