<html>
  <head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">

    <title>Trading Partner Form</title>
  </head>
  <body style="padding: 50px;">
    @if(canRender)
    {
    <div>
@if(isAddMode)
    {
<h1 >Add a New Trading Partner</h1>
    }
    @else {
      <h2>Edit Trading Partner - {{tradingPartner}}</h2>
    }
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-group" >
    <div class="form-row">

        <div class="form-group col-9">
            <label>Trading Partner Name *</label>
            <input type="text" formControlName="Name" class="form-control"
            [ngClass]="{ 'is-invalid': submitted && f.Name.errors }" />

        </div>


      </div>
 <div class="form-row">
  <table>
    <tr> <td>

          <mat-form-field appearance="fill" style="font-size: 8px; width: fit-content;" >
          <mat-label style="font-size: medium; ">TP type:</mat-label>
          <mat-select style="font-size: medium;" formControlName="TPtype" id="TPtype" name="TPtype"
          [multiple]="false" >
            <mat-option value={{tpType}}>{{tpType}}</mat-option>
              <mat-option value="Clearinghouse">Clearinghouse</mat-option>
              <mat-option value="Owner">Owner</mat-option>
          </mat-select>
          </mat-form-field>
          </td>
          @if(!isAddMode)
    {
  <td>
 <label  style="color: grey; margin-left: 50pt;">TPID: </label>
            <input style="color: grey; margin-left: 10pt;" formControlName="TpId" matInput readonly
            [(ngModel)]="tpId" matTooltip="Read Only, Edit in TPID screen" />


  </td>
}
</tr>
  </table>
 </div>


    <div class="form-row">
      <div class="form-group col-9">
        <label>Contact Name</label>
        <input type="text" formControlName="ContactName" class="form-control"  />

        <BR>

    </div>
    </div>


    <div class="form-row">
      <div class="form-group col-9">
        <label>Phone</label>
        <input type="text" formControlName="Phone" class="form-control"  />

        <BR>

    </div>
    </div>


    <div class="form-row">
      <div class="form-group col-9">
        <label>Email</label>
        <input type="text" formControlName="Email" class="form-control" />

        <BR>
    </div>

  </div>



<br>
<div class="form-row">

       <div class="form-group" style="text-align: center;">
        <button [disabled]="loading" class="btn btn-primary">
          @if (loading)
          {
            <span class="spinner-border spinner-border-sm mr-1"></span>
          }
            Save Trading Partner
        </button>
         @if (loading && createLink)
          {
            <button [disabled]="loading" class="btn btn-primary" style="margin-left: 10pt;" (click)="onSubmitCreateLinks()">

                <span class="spinner-border spinner-border-sm mr-1"></span>

                Save TP and Create Links
            </button>
          }
        <a (click)="onCancel()" class="btn btn-link">Cancel</a>


    </div>
</div>

</form>
</div>
    }

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI" crossorigin="anonymous"></script>
</body>
</html>
