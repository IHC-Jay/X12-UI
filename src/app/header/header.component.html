<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<html>
  <head>
    <title>TP Login</title>
  </head>

  <body style="padding: 1px; background-color: #111827;">
  <nav class="navbar navbar-default" style="background-color: #111827; border-color: #374151; margin-bottom: 0;">

          <ng-template [ngIf]="isLogin" [ngIfElse]="loggedOut">
          <button style="border-spacing: 0pc; padding: 0pc; display:flex; flex-direction:column; align-items:center; gap:4px;" on-click="onHome()" >
            <img width="100%" src="{{logo}}" >
            <div style="font-size: 8pt; color: #666; white-space: nowrap; display: none;">Build: {{appVersion}}</div>
          </button>

          <div style="align-items: start;">

            <h4 id="searchInfo" *ngIf="searchStr!=='' ">{{searchStr}}</h4>
          </div>


      <div style="align-items: start;">
        <mat-tab-group #tabGrp [selectedIndex]="selectedLnkIndex.value" *ngIf="isLogin && searchStr === ''" mat-stretch-tabs="false" mat-align-tabs="start"
         (selectedTabChange)="onTabChanged($event)"
         [ngStyle]="{'--tab-label-color': currentTheme === 'dark' ? '#ffffff' : '#111827'}">


        <ng-container *ngFor="let lnk of links; let i = index">
          <!-- If the link has children, render as a dropdown menu with a unique menu reference -->
            <mat-tab *ngIf="!lnk.children">
              <ng-template mat-tab-label>
                <span
                  [style.color]="i === selectedLnkIndex.value ? (currentTheme === 'dark' ? '#93c5fd' : '#1d4ed8') : (currentTheme === 'dark' ? '#ffffff' : '#111827')"
                  [style.font-weight]="i === selectedLnkIndex.value ? '700' : '500'">
                  {{lnk.name}}
                </span>
              </ng-template>
            </mat-tab>
            <mat-tab *ngIf="lnk.name === 'Utilities' && lnk.children && lnk.children.length > 0">
              <ng-template mat-tab-label>
                <span style="cursor: pointer;"
                      [style.color]="i === selectedLnkIndex.value ? (currentTheme === 'dark' ? '#93c5fd' : '#1d4ed8') : (currentTheme === 'dark' ? '#ffffff' : '#111827')"
                      [style.font-weight]="i === selectedLnkIndex.value ? '700' : '500'"
                      [matMenuTriggerFor]="utilitiesMenu"
                      (click)="onUtilityTabClick(i, $event)">
                  {{lnk.name}}
                  <mat-icon>arrow_drop_down</mat-icon>
                </span>
              </ng-template>
            </mat-tab>
            <mat-menu #utilitiesMenu="matMenu" [panelClass]="currentTheme === 'dark' ? 'utility-menu-dark' : 'utility-menu-light'">
              <button
                type="button"
                mat-menu-item
                *ngFor="let child of lnk.children"
                style="color: #111827"
                (click)="navigateTo(child)">
                {{child.name}}
              </button>
            </mat-menu>
        </ng-container>



      </mat-tab-group>
      </div>


                  <div id="logout" *ngIf=isLogin style="display:flex; flex-direction:row; align-items:center; justify-content:flex-end; margin-left:auto; gap:4px; text-align:right;">
                    <button
                      type="button"
                      class="header-help-btn"
                      (click)="openHelp()"
                      title="Help"
                      aria-label="Help">
                      <mat-icon class="header-help-icon">help_outline</mat-icon>
                    </button>
                    <button type="button" class="theme-toggle-btn header-theme-btn" (click)="toggleTheme()">
                      Theme: {{ currentTheme === 'dark' ? 'Dark' : 'Light' }}
                    </button>
                    <button type="button" class="header-logout-btn" (click)="logout()" title="Logout" aria-label="Logout">{{currentUser.username}} &#64; {{currentUser.environment}}</button>
          </div>
        </ng-template>
        <ng-template #loggedOut>
          <img [border]="1" width="100" alt="My image name" src="{{logo}}">
          <div class="tpm-title" style="font-size: 18px; align-self: center;"> Trading Partner Management</div>
          <button type="button" class="theme-toggle-btn" (click)="toggleTheme()">
            Theme: {{ currentTheme === 'dark' ? 'Dark' : 'Light' }}
          </button>
          <div style="font-size: 8pt; color: #666; align-self: center; display: none;">Build: {{appVersion}}</div>
        </ng-template>

  </nav>

  <div class="col-md-6 offset-md-3 mt-5" *ngIf=!isLogin>
    <div style="background: #111827; border: 1px solid #374151; padding: 12px;">
      <div style="background-color: #111827; font-size: 13px; color: #e5e7eb; margin-bottom: 10px;">
        {{displayHelp}}
      </div>
      <div style="background-color: #111827; border: 1px solid #374151;">
        <div style="background-color: #111827; padding: 6px 10px; font-size: 13px; font-weight: bold; color: #e5e7eb; border-bottom: 1px solid #374151;">
          Login
        </div>
        <div style="background-color: #111827; padding: 12px;">
          <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <table style="font-size: 10px; background-color: #111827; width: 100%;">
              <tr>
                <td style="font-size: 10px; padding: 4px 4px 8px 4px; vertical-align: top;">
                  <label style="font-size: 10px; font-weight: bold; color: navy;">Username</label><br/>
                  <input type="text" formControlName="username"
                    style="font-size: 11px; width: 100%; background-color: #1f2937; color: #e5e7eb; border: 1px solid #4b5563; padding: 3px 6px;" />
                  <div *ngIf="loginForm.get('username')?.errors?.['required']" style="color: red; font-size: small; font-style: italic;">Username is required</div>
                </td>
              </tr>
              <tr>
                <td style="font-size: 10px; padding: 4px 4px 8px 4px; vertical-align: top;">
                  <label style="font-size: 10px; font-weight: bold; color: navy;">Password</label><br/>
                  <input type="password" formControlName="password"
                    style="font-size: 11px; width: 100%; background-color: #1f2937; color: #e5e7eb; border: 1px solid #4b5563; padding: 3px 6px;"
                    [ngClass]="{ 'is-invalid': submitted && f.password.errors }" />
                  <div *ngIf="loginForm.get('password')?.errors?.['required']" style="color: red; font-size: small; font-style: italic;">Password is required</div>
                </td>
              </tr>
              <tr>
                <td style="font-size: 10px; padding: 4px; vertical-align: top;">
                  <table style="font-size: 10px; background-color: #111827; border: 1px solid #374151;">
                    <tr>
                      <td style="font-size: 10px; padding: 4px; vertical-align: top;">
                        <label style="font-size: 10px; font-weight: bold; color: navy;">Environment:</label>
                        <mat-select style="font-size: 10px; background-color: #1f2937; color: #e5e7eb; border: 1px solid #4b5563; padding: 2px 4px; width: 100%;"
                          formControlName="env">
                          @for (env of allowedEnvironments; track env) {
                            <mat-option [value]="env" style="font-size: 10px;">{{env}}</mat-option>
                          }
                        </mat-select>
                      </td>
                      <td style="font-size: 10px; padding: 4px; vertical-align: top;">
                        <label style="font-size: 10px; font-weight: bold; color: navy;">Auto Logout (in min):</label>
                        <mat-select style="font-size: 10px; background-color: #1f2937; color: #e5e7eb; border: 1px solid #4b5563; padding: 2px 4px; width: 100%;"
                          formControlName="logoutTime">
                          <mat-option value="15">15</mat-option>
                          <mat-option value="30">30</mat-option>
                          <mat-option value="60">60</mat-option>
                          <mat-option value="120">120</mat-option>
                        </mat-select>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
              <tr>
                <td style="padding: 8px 4px 4px 4px;">
                  <button class="btn btn-primary"
                    style="font-family: Arial; background-color: navy; font-size: 11px;">
                    Login
                  </button>
                  <div *ngIf="error" class="alert alert-danger mt-3 mb-0">{{error}}</div>
                </td>
              </tr>
            </table>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
